baseURL: "https://gpmarchdev.github.io/Gavin_Learns_Tech/" 
title: Gavin Learns Tech
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Books
          url: books/
          weight: 5 
        - name: Papers
          url: papers/
          weight: 2
        - name: Courses
          url: courses/
          weight: 3
        - name: Data
          url: data/
          weight: 4 
        - name: Blog
          url: https://en.wikipedia.org/wiki/Moritz-Maria_von_Igelfeld_(character)
          weight: 6

params:
    description: "With this blog, I will be documenting my journey to learn college level math, physics, and robotics. I plan to go from a complete beginner to an expert in the field of computer engineering. Thank you for any support along the way!"
    author: Gavin Marchant
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["books","courses","papers","data"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Gavin Learns Tech
          subtitle: "With this blog, I will be documenting my journey to learn college level math, physics, and robotics. I plan to go from a complete beginner to an expert in the field of computer engineering. Thank you for any support along the way!"
          imageUrl: "robot.png"
          imageWidth: 350
          imageHeight: 350
          buttons:
            - name: Blog Posts
              url: posts/
            - name: Archive
              url: archive/

    socialIcons:
        - name: Email
          url: mailto:gavinlearnstech@gmail.com
        - name: GitHub
          url: https://github.com/gpmarchdev

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Moritz-Maria von Igelfeld"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2